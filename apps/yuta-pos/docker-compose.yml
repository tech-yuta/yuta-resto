services:
  pos:
    build:
      context: ../..
      dockerfile: apps/yuta-pos/Dockerfile
      args:
        NEXT_PUBLIC_POS_URL: ${NEXT_PUBLIC_POS_URL:-http://localhost:3003}
    ports:
      - "${POS_PORT:-3003}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_POS_URL: ${NEXT_PUBLIC_POS_URL:-http://localhost:3003}
    networks:
      - postgres
    restart: unless-stopped

  migrate:
    build:
      context: ../..
      dockerfile: apps/yuta-pos/Dockerfile
      target: builder
      args:
        NEXT_PUBLIC_POS_URL: ${NEXT_PUBLIC_POS_URL:-http://localhost:3003}
    working_dir: /app/packages/db
    command: pnpm db:migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - postgres
    profiles:
      - migrate

networks:
  postgres:
    name: ${POSTGRES_NETWORK:-postgres_default}
    external: true
