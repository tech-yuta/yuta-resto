services:
  display:
    build:
      context: ../..
      dockerfile: apps/yuta-display/Dockerfile
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgres://yuta:${POSTGRES_PASSWORD}@db:5432/luna_display
    volumes:
      - uploads:/app/apps/yuta-display/public/uploads/display
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Run once to apply DB migrations: docker compose run --rm migrate
  migrate:
    build:
      context: ../..
      dockerfile: apps/yuta-display/Dockerfile
      target: builder
    working_dir: /app
    command: pnpm --filter @yuta/display db:migrate
    environment:
      DATABASE_URL: postgres://yuta:${POSTGRES_PASSWORD}@db:5432/luna_display
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yuta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: luna_display
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuta -d luna_display"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  uploads:
  pgdata:
