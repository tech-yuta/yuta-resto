services:
  display:
    build:
      context: ../..
      dockerfile: apps/yuta-display/Dockerfile
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      UPLOAD_DIR: /app/apps/yuta-display/public/uploads/display
    volumes:
      - uploads:/app/apps/yuta-display/public/uploads/display
    networks:
      - postgres
    restart: unless-stopped

  # Run once to apply DB migrations to the existing production database:
  # docker compose --profile migrate run --rm migrate
  migrate:
    build:
      context: ../..
      dockerfile: apps/yuta-display/Dockerfile
      target: builder
    working_dir: /app
    command: pnpm --filter @yuta/display db:migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - postgres
    profiles:
      - migrate

volumes:
  uploads:

networks:
  postgres:
    name: ${POSTGRES_NETWORK:-postgres_default}
    external: true
