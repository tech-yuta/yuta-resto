# Development only — starts PostgreSQL locally for yuta-display.
# The Next.js app runs with `pnpm dev:display`, not inside Docker.
#
# Usage:
#   docker compose -f apps/yuta-display/docker-compose.dev.yml up -d
#   docker compose -f apps/yuta-display/docker-compose.dev.yml down
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yuta
      POSTGRES_PASSWORD: yuta
      POSTGRES_DB: luna_display
    ports:
      - "5433:5432"
    volumes:
      - luna_display_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuta -d luna_display"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  luna_display_dev:
